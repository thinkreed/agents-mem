services:
  agents-mem-test:
    build: .
    container_name: agents-mem-test
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./package.json:/app/package.json
      - ./bun.lockb:/app/bun.lockb
      - ./DESIGN.md:/app/DESIGN.md
      - ./IMPLEMENTATION_PLAN.md:/app/IMPLEMENTATION_PLAN.md
      # LanceDB data directory
      - lance_data:/app/.agents_mem
    environment:
      - NODE_ENV=test
      - OLLAMA_URL=http://host.docker.internal:11434
      # Local development proxy (optional, remove if not needed)
      # HTTP proxy for external calls
      - HTTP_PROXY=http://host.docker.internal:10809
      - HTTPS_PROXY=http://host.docker.internal:10809
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: bun test tests/lance

volumes:
  lance_data: